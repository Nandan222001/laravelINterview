<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Implementation Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        h1 {
            color: #e3342f;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .section h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #333;
        }
        .check-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .status {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }
        .status.pass {
            background: #48bb78;
        }
        .status.fail {
            background: #f56565;
        }
        .status.warn {
            background: #ed8936;
        }
        .status.pending {
            background: #cbd5e0;
        }
        .check-label {
            flex: 1;
            font-weight: 500;
            color: #333;
        }
        .check-detail {
            font-size: 0.85rem;
            color: #666;
            margin-left: 46px;
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .summary-card {
            padding: 1.5rem;
            border-radius: 8px;
            color: white;
            text-align: center;
        }
        .summary-card.pass {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }
        .summary-card.fail {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }
        .summary-card.warn {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }
        .summary-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .summary-label {
            font-size: 0.9rem;
            opacity: 0.95;
        }
        button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #e3342f 0%, #cc1f1a 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-right: 1rem;
            margin-bottom: 1rem;
        }
        button:hover {
            background: linear-gradient(135deg, #cc1f1a 0%, #b81813 100%);
        }
        .buttons {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ PWA Implementation Verification</h1>
        <p class="subtitle">Checking all components are properly configured...</p>

        <div class="summary" id="summary"></div>

        <div class="buttons">
            <button onclick="runAllChecks()">Run All Checks</button>
            <button onclick="location.href='/offline-test.html'">Open Test Page</button>
            <button onclick="location.href='/'">Go to Home</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const checks = {
            'Core Files': [
                {
                    name: 'Service Worker exists',
                    check: () => fetch('/service-worker.js').then(r => r.ok),
                    detail: 'service-worker.js in root'
                },
                {
                    name: 'Manifest exists',
                    check: () => fetch('/manifest.json').then(r => r.ok),
                    detail: 'manifest.json in root'
                },
                {
                    name: 'Offline support script exists',
                    check: () => fetch('/assets/js/offline-support.js').then(r => r.ok),
                    detail: 'assets/js/offline-support.js'
                }
            ],
            'Service Worker': [
                {
                    name: 'Service Worker API supported',
                    check: () => Promise.resolve('serviceWorker' in navigator),
                    detail: 'Browser supports Service Workers'
                },
                {
                    name: 'Service Worker registered',
                    check: () => navigator.serviceWorker.getRegistration().then(r => !!r),
                    detail: 'Service Worker is registered'
                },
                {
                    name: 'Service Worker active',
                    check: () => Promise.resolve(!!navigator.serviceWorker.controller),
                    detail: 'Service Worker is controlling the page'
                }
            ],
            'Manifest': [
                {
                    name: 'Manifest loads correctly',
                    check: async () => {
                        const response = await fetch('/manifest.json');
                        const manifest = await response.json();
                        return manifest.name && manifest.icons;
                    },
                    detail: 'Manifest JSON is valid'
                },
                {
                    name: 'Manifest linked in HTML',
                    check: () => Promise.resolve(!!document.querySelector('link[rel="manifest"]')),
                    detail: '<link rel="manifest"> exists'
                },
                {
                    name: 'Theme color set',
                    check: () => Promise.resolve(!!document.querySelector('meta[name="theme-color"]')),
                    detail: '<meta name="theme-color"> exists'
                }
            ],
            'Cache Storage': [
                {
                    name: 'Cache API supported',
                    check: () => Promise.resolve('caches' in window),
                    detail: 'Browser supports Cache API'
                },
                {
                    name: 'Static cache exists',
                    check: async () => {
                        const cacheNames = await caches.keys();
                        return cacheNames.some(name => name.includes('static'));
                    },
                    detail: 'Static cache created by service worker'
                },
                {
                    name: 'Cache has content',
                    check: async () => {
                        const cacheNames = await caches.keys();
                        if (cacheNames.length === 0) return false;
                        const cache = await caches.open(cacheNames[0]);
                        const keys = await cache.keys();
                        return keys.length > 0;
                    },
                    detail: 'Cache contains files'
                }
            ],
            'Offline Support': [
                {
                    name: 'Offline support module loaded',
                    check: () => Promise.resolve(typeof window.offlineSupport !== 'undefined'),
                    detail: 'window.offlineSupport is available'
                },
                {
                    name: 'Offline storage wrapper available',
                    check: () => Promise.resolve(typeof window.offlineStorage !== 'undefined'),
                    detail: 'window.offlineStorage is available'
                },
                {
                    name: 'Queue system functional',
                    check: () => {
                        if (!window.offlineSupport) return false;
                        const status = window.offlineSupport.getQueueStatus();
                        return typeof status.queueLength === 'number';
                    },
                    detail: 'Queue can be accessed'
                }
            ],
            'Visual Indicators': [
                {
                    name: 'Offline indicator in DOM',
                    check: () => Promise.resolve(!!document.getElementById('offline-indicator')),
                    detail: 'Navigation status indicator present'
                },
                {
                    name: 'Online/Offline detection working',
                    check: () => {
                        if (!window.offlineSupport) return false;
                        const status = window.offlineSupport.getQueueStatus();
                        return typeof status.isOnline === 'boolean';
                    },
                    detail: 'Can detect connection status'
                }
            ],
            'Documentation': [
                {
                    name: 'Quick start guide exists',
                    check: () => fetch('/PWA_QUICK_START.md').then(r => r.ok),
                    detail: 'PWA_QUICK_START.md'
                },
                {
                    name: 'Full documentation exists',
                    check: () => fetch('/PWA_OFFLINE_SUPPORT.md').then(r => r.ok),
                    detail: 'PWA_OFFLINE_SUPPORT.md'
                },
                {
                    name: 'Implementation summary exists',
                    check: () => fetch('/PWA_IMPLEMENTATION_SUMMARY.md').then(r => r.ok),
                    detail: 'PWA_IMPLEMENTATION_SUMMARY.md'
                }
            ],
            'Testing': [
                {
                    name: 'Test page exists',
                    check: () => fetch('/offline-test.html').then(r => r.ok),
                    detail: 'offline-test.html'
                },
                {
                    name: 'Icon generator exists',
                    check: () => fetch('/icons/generate-icons.html').then(r => r.ok),
                    detail: 'icons/generate-icons.html'
                }
            ]
        };

        async function runAllChecks() {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            let totalPass = 0;
            let totalFail = 0;
            let totalWarn = 0;

            for (const [section, sectionChecks] of Object.entries(checks)) {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'section';
                
                const title = document.createElement('h2');
                title.textContent = section;
                sectionDiv.appendChild(title);

                for (const checkItem of sectionChecks) {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'check-item';

                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'status pending';
                    statusDiv.textContent = '⏳';

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'check-label';
                    labelDiv.textContent = checkItem.name;

                    itemDiv.appendChild(statusDiv);
                    itemDiv.appendChild(labelDiv);
                    sectionDiv.appendChild(itemDiv);

                    const detailDiv = document.createElement('div');
                    detailDiv.className = 'check-detail';
                    detailDiv.textContent = checkItem.detail;
                    sectionDiv.appendChild(detailDiv);

                    // Run check
                    try {
                        const result = await checkItem.check();
                        if (result === true) {
                            statusDiv.className = 'status pass';
                            statusDiv.textContent = '✓';
                            totalPass++;
                        } else if (result === false) {
                            statusDiv.className = 'status fail';
                            statusDiv.textContent = '✗';
                            totalFail++;
                        } else {
                            statusDiv.className = 'status warn';
                            statusDiv.textContent = '!';
                            totalWarn++;
                        }
                    } catch (error) {
                        statusDiv.className = 'status fail';
                        statusDiv.textContent = '✗';
                        detailDiv.textContent += ` (Error: ${error.message})`;
                        totalFail++;
                    }
                }

                resultsContainer.appendChild(sectionDiv);
            }

            // Update summary
            const summaryDiv = document.getElementById('summary');
            summaryDiv.innerHTML = `
                <div class="summary-card pass">
                    <div class="summary-number">${totalPass}</div>
                    <div class="summary-label">Passed</div>
                </div>
                <div class="summary-card fail">
                    <div class="summary-number">${totalFail}</div>
                    <div class="summary-label">Failed</div>
                </div>
                <div class="summary-card warn">
                    <div class="summary-number">${totalWarn}</div>
                    <div class="summary-label">Warnings</div>
                </div>
            `;

            // Show result message
            const total = totalPass + totalFail + totalWarn;
            if (totalFail === 0) {
                alert(`✅ All checks passed! (${totalPass}/${total})\n\nYour PWA is properly configured and ready to use!`);
            } else {
                alert(`⚠️ Some checks failed (${totalPass} passed, ${totalFail} failed, ${totalWarn} warnings)\n\nPlease review the results and fix any issues.`);
            }
        }

        // Run checks on load
        window.addEventListener('load', () => {
            setTimeout(runAllChecks, 1000);
        });
    </script>
</body>
</html>
