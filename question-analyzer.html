<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Count Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h1 {
            color: #e3342f;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #e3342f;
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #e3342f;
        }
        button {
            padding: 12px 24px;
            background: #e3342f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background: #cc1f1a;
        }
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 8px;
        }
        .question-list {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
        }
        .success { color: #28a745; font-weight: bold; }
        .warning { color: #ff9800; font-weight: bold; }
        .error { color: #c62828; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Question Count Analyzer</h1>
        <p>This tool analyzes how many questions are actually being loaded and displayed.</p>

        <div class="stats" id="stats"></div>

        <button onclick="analyzeAllTopics()">🔍 Analyze All Topics</button>

        <div class="results" id="results" style="display:none;"></div>
    </div>

    <script>
        function parseNumberedBlocks(markdownText) {
            if (!markdownText) return [];
            const blocks = [];
            const lines = markdownText.split('\n');
            let currentNum = null;
            let currentText = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const numMatch = line.match(/^\s*(\d+)\.\s+(.*)/);

                if (numMatch) {
                    if (currentNum !== null && currentText) {
                        blocks.push({ num: currentNum, text: currentText.trim() });
                    }
                    currentNum = numMatch[1];
                    currentText = numMatch[2];
                } else if (currentNum !== null) {
                    if (line.trim()) {
                        currentText += '\n' + line;
                    }
                }
            }

            if (currentNum !== null && currentText) {
                blocks.push({ num: currentNum, text: currentText.trim() });
            }

            return blocks;
        }

        async function analyzeAllTopics() {
            const topics = [
                { name: '⭐ PHP & Laravel', path: 'interview-bank/php-laravel-api-security' },
                { name: '🗂️ Database Optimization', path: 'interview-bank/database-optimization' },
                { name: '🚀 AI, LLM & Serverless', path: 'interview-bank/ai-llm-serverless' },
                { name: '⚛️ Frontend React & Next.js', path: 'interview-bank/frontend-react-nextjs' },
                { name: '🔌 Real-time Communication', path: 'interview-bank/realtime-communication' },
                { name: '☸️ DevOps, Cloud & Kubernetes', path: 'interview-bank/devops-cloud-k8s' },
            ];

            const results = document.getElementById('results');
            results.style.display = 'block';
            results.innerHTML = '<h2>Analysis Results</h2><p>Analyzing...</p>';

            let totalQuestions = 0;
            let totalAnswers = 0;
            let html = '<h3>📊 Topic Breakdown</h3><table style="width:100%; border-collapse: collapse;">';
            html += '<tr style="background: #f0f0f0;"><th style="border: 1px solid #ddd; padding: 10px; text-align:left;">Topic</th><th style="border: 1px solid #ddd; padding: 10px;">Questions</th><th style="border: 1px solid #ddd; padding: 10px;">Answers</th></tr>';

            for (const topic of topics) {
                try {
                    const qResponse = await fetch(`${topic.path}/questions.md`);
                    const qText = await qResponse.text();
                    const questions = parseNumberedBlocks(qText);

                    const aResponse = await fetch(`${topic.path}/answers.md`);
                    let answers = [];
                    if (aResponse.ok) {
                        const aText = await aResponse.text();
                        answers = parseNumberedBlocks(aText);
                    }

                    totalQuestions += questions.length;
                    totalAnswers += answers.length;

                    html += `<tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">${topic.name}</td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center;"><span class="success">${questions.length}</span></td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center;"><span class="success">${answers.length}</span></td>
                    </tr>`;

                } catch (error) {
                    html += `<tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">${topic.name}</td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center;"><span class="error">Error</span></td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center;"><span class="error">Error</span></td>
                    </tr>`;
                }
            }

            html += '</table>';
            html += `<h3 style="margin-top: 20px;">📈 Summary</h3>`;
            html += `<p><strong>Total Questions:</strong> <span class="success">${totalQuestions}</span></p>`;
            html += `<p><strong>Total Answers:</strong> <span class="success">${totalAnswers}</span></p>`;
            html += `<p><strong>Coverage:</strong> <span class="${totalAnswers / totalQuestions >= 0.5 ? 'success' : 'warning'}">${(totalAnswers / totalQuestions * 100).toFixed(1)}%</span></p>`;

            results.innerHTML += html;
        }

        // Show initial message
        const stats = document.getElementById('stats');
        stats.innerHTML = `
            <div class="stat-card">
                <h3>Ready to Analyze</h3>
                <p>Click the analyze button to check all topics.</p>
            </div>
        `;
    </script>
</body>
</html>
