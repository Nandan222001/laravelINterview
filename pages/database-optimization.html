class AccountController extends Controller

    {
        // Query 1: Fetch all accounts

        foreach ($accounts as $account) {
            // Query N+1: One query PER account

        }
        // Total: 1 + (N × 2) queries!

class AccountController extends Controller
{
    public function index()
    {
        // Only 3 queries total
        $accounts = Account::where('status', 'active')
            ->with(['customer', 'transactions'])
            ->withCount('transactions')
            ->get();
        
        foreach ($accounts as $account) {
            echo $account->customer->name;  // No additional query
            echo $account->transactions_count;  // No additional query
        }
    }
}

    $cacheKey = "account:{$accountId}";
    
    // 1. Check cache first
    $cached = Redis::get($cacheKey);
    if ($cached !== null) {
        return json_decode($cached, true);
    }
    
    // 2. Cache miss - query database
    $account = DB::table('accounts')->find($accountId);
    
    // 3. Store in cache for future requests
    Redis::setex($cacheKey, 3600, json_encode($account));
    
    return (array) $account;
}
</code></pre>

            };

            // Generate remaining questions for each section
            for (const [topic, range] of Object.entries(topics)) {
                for (let i = range.start; i <= range.end; i++) {
                    if (!generated.find(q => q.id === i)) {
                        generated.push({
                            id: i,
                            topic: topic,
                            question: `${range.description} - Question ${i}`,
                            answer: `<p>This is a comprehensive answer for question ${i} about ${range.description}.</p>
                            <p>Key concepts covered include best practices, performance optimization, and real-world banking application examples.</p>`
                        });
                    }
                }
            }

            return generated.sort((a, b) => a.id - b.id);
        }

        function renderQuestions(questionsToRender) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = questionsToRender.map(q => `
                <article data-topic="${q.topic}" data-id="${q.id}">
                    <div class="question-header">
                        <div class="question">${q.id}. ${q.question}</div>
                        <div class="badges">
                            <span class="badge badge-topic" data-topic="${q.topic}">${q.topic}</span>
                        </div>
                    </div>
                    <div class="answer">${q.answer}</div>
                </article>
            `).join('');

            updateStats(questionsToRender.length);
        }

        function updateStats(visibleCount) {
            document.getElementById('visibleCount').textContent = visibleCount;
            document.getElementById('totalCount').textContent = allQuestions.length;
        }

        function filterQuestions() {
            const topicFilter = document.getElementById('topicFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allQuestions.filter(q => {
                const matchesTopic = topicFilter === 'all' || q.topic === topicFilter;
                const matchesSearch = searchTerm === '' || 
                    q.question.toLowerCase().includes(searchTerm) ||
                    q.answer.toLowerCase().includes(searchTerm);
                return matchesTopic && matchesSearch;
            });

            renderQuestions(filtered);
        }

        // Event listeners
        document.getElementById('topicFilter').addEventListener('change', filterQuestions);
        document.getElementById('searchInput').addEventListener('input', filterQuestions);

        // Initial render
        renderQuestions(allQuestions);
    </script>
</body>
</html>
