<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Timed Quiz Mode - Laravel Interview Questions">
    <meta name="keywords" content="Laravel, Interview Questions, Quiz, Practice Test">
    <title>Quiz Mode - Laravel Interview Question Bank</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --white: #ffffff;
            --border: #dee2e6;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 15px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1rem;
            opacity: 0.95;
        }

        .breadcrumb {
            padding: 15px 30px;
            background: var(--light);
            border-bottom: 1px solid var(--border);
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #6c757d;
            margin: 0 8px;
        }

        .config-section,
        .quiz-section,
        .results-section {
            padding: 40px 30px;
        }

        .config-section {
            background: var(--white);
        }

        .config-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--dark);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--dark);
        }

        .form-group select,
        .form-group input[type="number"] {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            background: var(--white);
            transition: all 0.3s;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .checkbox-label:hover {
            background: var(--light);
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: var(--white);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn-success:hover:not(:disabled) {
            background: #218838;
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-info {
            background: var(--info);
            color: var(--white);
        }

        .info-text {
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .timer-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .timer-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-ring-circle-bg {
            fill: none;
            stroke: var(--light);
            stroke-width: 8;
        }

        .timer-ring-circle {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .timer-ring-circle.warning {
            stroke: var(--warning);
        }

        .timer-ring-circle.danger {
            stroke: var(--danger);
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }

        .timer-label {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: 600;
        }

        .progress-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
        }

        .progress-bar-container {
            width: 250px;
            height: 8px;
            background: var(--light);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.3s;
        }

        .question-card {
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 20px;
        }

        .question-number {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .question-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-beginner { background: #d4edda; color: #155724; }
        .badge-intermediate { background: #fff3cd; color: #856404; }
        .badge-advanced { background: #f8d7da; color: #721c24; }
        .badge-expert { background: #d1ecf1; color: #0c5460; }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--dark);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .answer-option {
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--white);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .answer-option:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
            transform: translateX(5px);
        }

        .answer-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .answer-option.selected {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }

        .answer-option.correct {
            border-color: var(--success);
            background: rgba(40, 167, 69, 0.1);
        }

        .answer-option.incorrect {
            border-color: var(--danger);
            background: rgba(220, 53, 69, 0.1);
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .feedback-section {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-correct {
            background: rgba(40, 167, 69, 0.1);
            border-left: 4px solid var(--success);
        }

        .feedback-incorrect {
            background: rgba(220, 53, 69, 0.1);
            border-left: 4px solid var(--danger);
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback-correct .feedback-title {
            color: var(--success);
        }

        .feedback-incorrect .feedback-title {
            color: var(--danger);
        }

        .feedback-content {
            color: var(--dark);
            line-height: 1.6;
        }

        .explanation-section {
            margin-top: 10px;
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
        }

        .explanation-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .quiz-controls {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .results-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .results-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .results-subtitle {
            font-size: 1.1rem;
            color: #6c757d;
        }

        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-card {
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .result-label {
            font-size: 0.9rem;
            color: #6c757d;
            font-weight: 600;
            text-transform: uppercase;
        }

        .result-card.score .result-value {
            color: var(--primary);
        }

        .result-card.correct .result-value {
            color: var(--success);
        }

        .result-card.incorrect .result-value {
            color: var(--danger);
        }

        .result-card.time .result-value {
            color: var(--info);
        }

        .score-chart {
            width: 100%;
            max-width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            position: relative;
        }

        .score-circle {
            transform: rotate(-90deg);
        }

        .score-circle-bg {
            fill: none;
            stroke: var(--light);
            stroke-width: 20;
        }

        .score-circle-fg {
            fill: none;
            stroke: url(#scoreGradient);
            stroke-width: 20;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-out;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-percentage {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .score-grade {
            font-size: 1.2rem;
            color: #6c757d;
        }

        .review-section {
            margin-top: 40px;
        }

        .review-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .review-question {
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .review-question.correct {
            border-left: 4px solid var(--success);
        }

        .review-question.incorrect {
            border-left: 4px solid var(--danger);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .review-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .review-status.correct {
            color: var(--success);
        }

        .review-status.incorrect {
            color: var(--danger);
        }

        .review-question-text {
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .review-answer-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .review-answer-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .review-answer-text {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .review-answer-text.user {
            background: rgba(220, 53, 69, 0.1);
        }

        .review-answer-text.correct {
            background: rgba(40, 167, 69, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .hidden {
            display: none !important;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .empty-text {
            color: #6c757d;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .config-section,
            .quiz-section,
            .results-section {
                padding: 20px 15px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .quiz-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .timer-section {
                flex-direction: column;
                width: 100%;
            }

            .progress-bar-container {
                width: 100%;
            }

            .timer-ring {
                width: 100px;
                height: 100px;
            }

            .timer-text {
                font-size: 1.2rem;
            }

            .quiz-controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .results-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⏱️ Quiz Mode</h1>
            <p>Test your knowledge with a timed quiz</p>
        </header>

        <nav class="breadcrumb">
            <a href="../index.html">Home</a>
            <span>›</span>
            <span>Quiz Mode</span>
        </nav>

        <section class="config-section" id="configSection">
            <h2 class="config-title">Configure Your Quiz</h2>
            
            <form id="quizConfigForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="topicSelect">Topic</label>
                        <select id="topicSelect" required>
                            <option value="all">All Topics</option>
                            <option value="php-laravel">PHP & Laravel</option>
                            <option value="database">Database Optimization</option>
                            <option value="devops">DevOps & Cloud</option>
                            <option value="frontend">Frontend React/Next.js</option>
                            <option value="realtime">Realtime Communication</option>
                            <option value="ai-serverless">AI & Serverless</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="questionCount">Number of Questions</label>
                        <input type="number" id="questionCount" min="5" max="50" value="10" required>
                    </div>

                    <div class="form-group">
                        <label for="timeLimit">Time Limit (minutes)</label>
                        <input type="number" id="timeLimit" min="5" max="120" value="15" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Difficulty Levels</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" class="difficulty-check" value="beginner" checked>
                            <span>Beginner</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="difficulty-check" value="intermediate" checked>
                            <span>Intermediate</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="difficulty-check" value="advanced" checked>
                            <span>Advanced</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="difficulty-check" value="expert" checked>
                            <span>Expert</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="feedbackMode">Feedback Mode</label>
                    <select id="feedbackMode" required>
                        <option value="immediate">Immediate (show answer after each question)</option>
                        <option value="end">End of Quiz (show all results at the end)</option>
                    </select>
                </div>

                <p class="info-text" id="availableQuestions">Loading questions...</p>

                <div style="margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" id="startQuizBtn">
                        🚀 Start Quiz
                    </button>
                </div>
            </form>
        </section>

        <section class="quiz-section hidden" id="quizSection">
            <div class="quiz-header">
                <div class="timer-section">
                    <div class="timer-display">
                        <div class="timer-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="timer-ring-circle-bg" cx="60" cy="60" r="54"></circle>
                                <circle class="timer-ring-circle" cx="60" cy="60" r="54" 
                                    stroke-dasharray="339.292" stroke-dashoffset="0" id="timerCircle"></circle>
                            </svg>
                            <div class="timer-text" id="timerText">15:00</div>
                        </div>
                        <div class="timer-label">Time Remaining</div>
                    </div>
                </div>

                <div class="progress-info">
                    <div class="progress-text" id="progressText">Question 1 of 10</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 10%;"></div>
                    </div>
                </div>
            </div>

            <div class="question-card" id="questionCard">
                <div class="question-header">
                    <span class="question-number" id="questionNumber">Question 1</span>
                    <div class="question-badges" id="questionBadges"></div>
                </div>

                <div class="question-text" id="questionText">Loading question...</div>

                <div id="answerArea"></div>

                <div class="feedback-section hidden" id="feedbackSection"></div>
            </div>

            <div class="quiz-controls">
                <button type="button" class="btn btn-secondary" id="prevBtn" disabled>
                    ← Previous
                </button>
                <button type="button" class="btn btn-danger" id="endQuizBtn">
                    End Quiz
                </button>
                <button type="button" class="btn btn-primary" id="nextBtn">
                    Next →
                </button>
                <button type="button" class="btn btn-success hidden" id="submitAnswerBtn">
                    Submit Answer
                </button>
            </div>
        </section>

        <section class="results-section hidden" id="resultsSection">
            <div class="results-header">
                <h2 class="results-title" id="resultsTitle">Quiz Complete! 🎉</h2>
                <p class="results-subtitle" id="resultsSubtitle"></p>
            </div>

            <div class="score-chart">
                <svg viewBox="0 0 200 200" class="score-circle">
                    <defs>
                        <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle class="score-circle-bg" cx="100" cy="100" r="80"></circle>
                    <circle class="score-circle-fg" cx="100" cy="100" r="80" 
                        stroke-dasharray="502.65" stroke-dashoffset="502.65" id="scoreCircle"></circle>
                </svg>
                <div class="score-text">
                    <div class="score-percentage" id="scorePercentage">0%</div>
                    <div class="score-grade" id="scoreGrade">F</div>
                </div>
            </div>

            <div class="results-summary">
                <div class="result-card score">
                    <div class="result-value" id="totalScore">0/10</div>
                    <div class="result-label">Score</div>
                </div>
                <div class="result-card correct">
                    <div class="result-value" id="correctCount">0</div>
                    <div class="result-label">Correct</div>
                </div>
                <div class="result-card incorrect">
                    <div class="result-value" id="incorrectCount">0</div>
                    <div class="result-label">Incorrect</div>
                </div>
                <div class="result-card time">
                    <div class="result-value" id="avgTime">0s</div>
                    <div class="result-label">Avg Time/Q</div>
                </div>
            </div>

            <div class="review-section" id="reviewSection">
                <h3 class="review-title">Review Incorrect Answers</h3>
                <div id="reviewQuestions"></div>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn btn-primary" id="retakeQuizBtn">
                    🔄 Retake Quiz
                </button>
                <button type="button" class="btn btn-secondary" id="newQuizBtn">
                    ✨ New Quiz
                </button>
                <button type="button" class="btn btn-info" id="backHomeBtn">
                    🏠 Back to Home
                </button>
            </div>
        </section>
    </div>

    <script src="../automation/php-laravel-data-complete.js"></script>
    <script src="../assets/js/database-questions.js"></script>
    <script src="../pages/data/devops-questions-core.js"></script>
    <script>
        (function() {
            'use strict';

            const state = {
                questions: [],
                filteredQuestions: [],
                currentQuestionIndex: 0,
                answers: {},
                startTime: null,
                endTime: null,
                timerInterval: null,
                timeRemaining: 0,
                config: {
                    topic: 'all',
                    questionCount: 10,
                    timeLimit: 15,
                    difficulties: ['beginner', 'intermediate', 'advanced', 'expert'],
                    feedbackMode: 'end'
                }
            };

            const elements = {
                configSection: document.getElementById('configSection'),
                quizSection: document.getElementById('quizSection'),
                resultsSection: document.getElementById('resultsSection'),
                quizConfigForm: document.getElementById('quizConfigForm'),
                topicSelect: document.getElementById('topicSelect'),
                questionCount: document.getElementById('questionCount'),
                timeLimit: document.getElementById('timeLimit'),
                difficultyChecks: document.querySelectorAll('.difficulty-check'),
                feedbackMode: document.getElementById('feedbackMode'),
                availableQuestions: document.getElementById('availableQuestions'),
                startQuizBtn: document.getElementById('startQuizBtn'),
                timerText: document.getElementById('timerText'),
                timerCircle: document.getElementById('timerCircle'),
                progressText: document.getElementById('progressText'),
                progressBar: document.getElementById('progressBar'),
                questionNumber: document.getElementById('questionNumber'),
                questionBadges: document.getElementById('questionBadges'),
                questionText: document.getElementById('questionText'),
                answerArea: document.getElementById('answerArea'),
                feedbackSection: document.getElementById('feedbackSection'),
                prevBtn: document.getElementById('prevBtn'),
                nextBtn: document.getElementById('nextBtn'),
                submitAnswerBtn: document.getElementById('submitAnswerBtn'),
                endQuizBtn: document.getElementById('endQuizBtn'),
                resultsTitle: document.getElementById('resultsTitle'),
                resultsSubtitle: document.getElementById('resultsSubtitle'),
                scorePercentage: document.getElementById('scorePercentage'),
                scoreGrade: document.getElementById('scoreGrade'),
                scoreCircle: document.getElementById('scoreCircle'),
                totalScore: document.getElementById('totalScore'),
                correctCount: document.getElementById('correctCount'),
                incorrectCount: document.getElementById('incorrectCount'),
                avgTime: document.getElementById('avgTime'),
                reviewQuestions: document.getElementById('reviewQuestions'),
                retakeQuizBtn: document.getElementById('retakeQuizBtn'),
                newQuizBtn: document.getElementById('newQuizBtn'),
                backHomeBtn: document.getElementById('backHomeBtn')
            };

            function loadAllQuestions() {
                const questions = [];

                if (typeof window.phpLaravelQuestions !== 'undefined') {
                    window.phpLaravelQuestions.forEach(q => {
                        questions.push(normalizeQuestion(q, 'php-laravel'));
                    });
                } else if (typeof questionDatabase !== 'undefined') {
                    questionDatabase.forEach(q => {
                        questions.push(normalizeQuestion(q, 'php-laravel'));
                    });
                }

                if (typeof databaseQuestions !== 'undefined') {
                    databaseQuestions.forEach(q => {
                        questions.push(normalizeQuestion(q, 'database'));
                    });
                }

                if (typeof window.generateComprehensiveQuestions === 'function') {
                    const devopsQuestions = window.generateComprehensiveQuestions();
                    devopsQuestions.forEach(q => {
                        questions.push(normalizeQuestion(q, 'devops'));
                    });
                }

                if (questions.length === 0) {
                    questions.push(...getSampleQuestions());
                }

                return questions;
            }

            function normalizeQuestion(q, topic) {
                const normalized = {
                    id: q.id || Math.random().toString(36).substr(2, 9),
                    topic: topic,
                    question: q.question || '',
                    answer: q.answer || q.overview || '',
                    difficulty: (q.difficulty || 'intermediate').toLowerCase(),
                    tags: Array.isArray(q.tags) ? q.tags : [],
                    type: 'text'
                };

                if (q.keyConcepts || q.codeExample || q.bestPractices) {
                    let fullAnswer = '';
                    if (q.overview) fullAnswer += q.overview;
                    if (q.keyConcepts) fullAnswer += q.keyConcepts;
                    if (q.codeExample) fullAnswer += q.codeExample;
                    if (q.bestPractices) fullAnswer += '<h4>Best Practices:</h4>' + q.bestPractices;
                    if (q.commonPitfalls) fullAnswer += '<h4>Common Pitfalls:</h4>' + q.commonPitfalls;
                    normalized.answer = fullAnswer;
                }

                return normalized;
            }

            function getSampleQuestions() {
                return [
                    {
                        id: 's1',
                        topic: 'php-laravel',
                        question: 'What is Laravel Service Container and how does it work?',
                        answer: '<p>The Laravel Service Container is a powerful dependency injection container that manages class dependencies and performs automatic dependency resolution.</p>',
                        difficulty: 'intermediate',
                        tags: ['laravel', 'architecture'],
                        type: 'text'
                    },
                    {
                        id: 's2',
                        topic: 'database',
                        question: 'Explain the difference between clustered and non-clustered indexes.',
                        answer: '<p>A clustered index determines the physical order of data in a table, while a non-clustered index creates a separate structure with pointers to the actual data rows.</p>',
                        difficulty: 'advanced',
                        tags: ['database', 'indexing'],
                        type: 'text'
                    },
                    {
                        id: 's3',
                        topic: 'devops',
                        question: 'What are the main benefits of using Kubernetes for container orchestration?',
                        answer: '<p>Kubernetes provides auto-scaling, self-healing, service discovery, load balancing, rolling updates, and declarative configuration management for containerized applications.</p>',
                        difficulty: 'intermediate',
                        tags: ['kubernetes', 'devops'],
                        type: 'text'
                    },
                    {
                        id: 's4',
                        topic: 'php-laravel',
                        question: 'How do you implement rate limiting in Laravel?',
                        answer: '<p>Laravel provides the throttle middleware for rate limiting. You can apply it to routes using Route::middleware(\'throttle:60,1\') to limit requests to 60 per minute.</p>',
                        difficulty: 'intermediate',
                        tags: ['laravel', 'security'],
                        type: 'text'
                    },
                    {
                        id: 's5',
                        topic: 'database',
                        question: 'What is database normalization and why is it important?',
                        answer: '<p>Database normalization is the process of organizing data to minimize redundancy and dependency. It helps improve data integrity, reduce storage space, and make maintenance easier.</p>',
                        difficulty: 'beginner',
                        tags: ['database', 'design'],
                        type: 'text'
                    }
                ];
            }

            function filterQuestions() {
                const topic = state.config.topic;
                const difficulties = state.config.difficulties;

                state.filteredQuestions = state.questions.filter(q => {
                    if (topic !== 'all' && q.topic !== topic) return false;
                    if (!difficulties.includes(q.difficulty)) return false;
                    return true;
                });

                shuffleArray(state.filteredQuestions);
                
                state.filteredQuestions = state.filteredQuestions.slice(0, state.config.questionCount);

                updateAvailableCount();
            }

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            function updateAvailableCount() {
                const available = state.questions.filter(q => {
                    if (state.config.topic !== 'all' && q.topic !== state.config.topic) return false;
                    if (!state.config.difficulties.includes(q.difficulty)) return false;
                    return true;
                }).length;

                elements.availableQuestions.textContent = 
                    `${available} questions available with current filters`;
            }

            function updateConfigFromForm() {
                state.config.topic = elements.topicSelect.value;
                state.config.questionCount = parseInt(elements.questionCount.value);
                state.config.timeLimit = parseInt(elements.timeLimit.value);
                state.config.feedbackMode = elements.feedbackMode.value;
                state.config.difficulties = Array.from(elements.difficultyChecks)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);
            }

            function startQuiz() {
                updateConfigFromForm();
                filterQuestions();

                if (state.filteredQuestions.length === 0) {
                    alert('No questions available with current filters. Please adjust your settings.');
                    return;
                }

                state.currentQuestionIndex = 0;
                state.answers = {};
                state.startTime = Date.now();
                state.timeRemaining = state.config.timeLimit * 60;

                elements.configSection.classList.add('hidden');
                elements.resultsSection.classList.add('hidden');
                elements.quizSection.classList.remove('hidden');

                startTimer();
                displayQuestion();
            }

            function startTimer() {
                const totalSeconds = state.config.timeLimit * 60;
                const circumference = 2 * Math.PI * 54;

                clearInterval(state.timerInterval);
                state.timerInterval = setInterval(() => {
                    state.timeRemaining--;

                    const minutes = Math.floor(state.timeRemaining / 60);
                    const seconds = state.timeRemaining % 60;
                    elements.timerText.textContent = 
                        `${minutes}:${seconds.toString().padStart(2, '0')}`;

                    const progress = state.timeRemaining / totalSeconds;
                    const offset = circumference * (1 - progress);
                    elements.timerCircle.style.strokeDashoffset = offset;

                    if (state.timeRemaining <= 60) {
                        elements.timerCircle.classList.add('danger');
                    } else if (state.timeRemaining <= 300) {
                        elements.timerCircle.classList.add('warning');
                    }

                    if (state.timeRemaining <= 0) {
                        endQuiz();
                    }
                }, 1000);
            }

            function displayQuestion() {
                const question = state.filteredQuestions[state.currentQuestionIndex];
                const questionNum = state.currentQuestionIndex + 1;
                const total = state.filteredQuestions.length;

                elements.questionNumber.textContent = `Question ${questionNum}`;
                elements.progressText.textContent = `Question ${questionNum} of ${total}`;
                elements.progressBar.style.width = `${(questionNum / total) * 100}%`;

                elements.questionBadges.innerHTML = `
                    <span class="badge badge-${question.difficulty}">${question.difficulty}</span>
                `;

                elements.questionText.textContent = question.question;

                elements.answerArea.innerHTML = `
                    <textarea class="answer-input" id="userAnswer" 
                        placeholder="Type your answer here..." rows="5">${state.answers[question.id] || ''}</textarea>
                `;

                elements.feedbackSection.classList.add('hidden');

                if (state.config.feedbackMode === 'immediate') {
                    elements.submitAnswerBtn.classList.remove('hidden');
                    elements.nextBtn.classList.add('hidden');
                } else {
                    elements.submitAnswerBtn.classList.add('hidden');
                    elements.nextBtn.classList.remove('hidden');
                }

                elements.prevBtn.disabled = state.currentQuestionIndex === 0;
            }

            function saveCurrentAnswer() {
                const question = state.filteredQuestions[state.currentQuestionIndex];
                const answerInput = document.getElementById('userAnswer');
                
                if (answerInput) {
                    state.answers[question.id] = answerInput.value;
                }
            }

            function submitAnswer() {
                saveCurrentAnswer();
                
                if (state.config.feedbackMode === 'immediate') {
                    showFeedback();
                    elements.submitAnswerBtn.classList.add('hidden');
                    elements.nextBtn.classList.remove('hidden');
                }
            }

            function showFeedback() {
                const question = state.filteredQuestions[state.currentQuestionIndex];
                const userAnswer = state.answers[question.id] || '';

                const isCorrect = userAnswer.trim().length > 10;

                elements.feedbackSection.className = 'feedback-section';
                elements.feedbackSection.classList.add(isCorrect ? 'feedback-correct' : 'feedback-incorrect');
                elements.feedbackSection.classList.remove('hidden');

                elements.feedbackSection.innerHTML = `
                    <div class="feedback-title">
                        ${isCorrect ? '✓ Good answer!' : '✗ Consider reviewing this'}
                    </div>
                    <div class="explanation-section">
                        <div class="explanation-title">Explanation:</div>
                        <div class="feedback-content">${question.answer}</div>
                    </div>
                `;
            }

            function nextQuestion() {
                saveCurrentAnswer();

                if (state.currentQuestionIndex < state.filteredQuestions.length - 1) {
                    state.currentQuestionIndex++;
                    displayQuestion();
                } else {
                    endQuiz();
                }
            }

            function previousQuestion() {
                saveCurrentAnswer();

                if (state.currentQuestionIndex > 0) {
                    state.currentQuestionIndex--;
                    displayQuestion();
                }
            }

            function endQuiz() {
                clearInterval(state.timerInterval);
                state.endTime = Date.now();

                elements.quizSection.classList.add('hidden');
                elements.resultsSection.classList.remove('hidden');

                calculateAndDisplayResults();
            }

            function calculateAndDisplayResults() {
                const totalQuestions = state.filteredQuestions.length;
                let correctCount = 0;
                const incorrectQuestions = [];

                state.filteredQuestions.forEach(question => {
                    const userAnswer = (state.answers[question.id] || '').trim();
                    const isAnswered = userAnswer.length > 0;
                    const hasSubstantialAnswer = userAnswer.length > 10;

                    if (hasSubstantialAnswer) {
                        correctCount++;
                    } else if (isAnswered) {
                        incorrectQuestions.push({
                            question,
                            userAnswer,
                            isCorrect: false
                        });
                    } else {
                        incorrectQuestions.push({
                            question,
                            userAnswer: '(No answer provided)',
                            isCorrect: false
                        });
                    }
                });

                const incorrectCount = totalQuestions - correctCount;
                const percentage = Math.round((correctCount / totalQuestions) * 100);
                const grade = getGrade(percentage);

                const totalTime = Math.floor((state.endTime - state.startTime) / 1000);
                const avgTimePerQuestion = Math.floor(totalTime / totalQuestions);

                elements.scorePercentage.textContent = `${percentage}%`;
                elements.scoreGrade.textContent = grade;
                elements.totalScore.textContent = `${correctCount}/${totalQuestions}`;
                elements.correctCount.textContent = correctCount;
                elements.incorrectCount.textContent = incorrectCount;
                elements.avgTime.textContent = `${avgTimePerQuestion}s`;

                const circumference = 2 * Math.PI * 80;
                const offset = circumference * (1 - percentage / 100);
                elements.scoreCircle.style.strokeDashoffset = offset;

                let subtitle = '';
                if (percentage >= 90) {
                    subtitle = '🌟 Outstanding performance!';
                } else if (percentage >= 80) {
                    subtitle = '🎯 Great job!';
                } else if (percentage >= 70) {
                    subtitle = '👍 Good effort!';
                } else if (percentage >= 60) {
                    subtitle = '📚 Keep practicing!';
                } else {
                    subtitle = '💪 Review the material and try again!';
                }
                elements.resultsSubtitle.textContent = subtitle;

                displayIncorrectAnswers(incorrectQuestions);
            }

            function getGrade(percentage) {
                if (percentage >= 90) return 'A';
                if (percentage >= 80) return 'B';
                if (percentage >= 70) return 'C';
                if (percentage >= 60) return 'D';
                return 'F';
            }

            function displayIncorrectAnswers(incorrectQuestions) {
                if (incorrectQuestions.length === 0) {
                    elements.reviewQuestions.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🎉</div>
                            <div class="empty-title">Perfect Score!</div>
                            <div class="empty-text">You answered all questions correctly!</div>
                        </div>
                    `;
                    return;
                }

                elements.reviewQuestions.innerHTML = incorrectQuestions.map((item, index) => `
                    <div class="review-question incorrect">
                        <div class="review-header">
                            <span class="question-number">Question ${state.filteredQuestions.indexOf(item.question) + 1}</span>
                            <span class="review-status incorrect">✗ Incorrect</span>
                        </div>
                        <div class="review-question-text">${item.question.question}</div>
                        <div class="review-answer-section">
                            <div class="review-answer-label">Your Answer:</div>
                            <div class="review-answer-text user">${item.userAnswer}</div>
                            <div class="review-answer-label">Correct Answer:</div>
                            <div class="review-answer-text correct">${item.question.answer}</div>
                        </div>
                    </div>
                `).join('');
            }

            function retakeQuiz() {
                startQuiz();
            }

            function newQuiz() {
                elements.resultsSection.classList.add('hidden');
                elements.configSection.classList.remove('hidden');
            }

            function setupEventListeners() {
                elements.quizConfigForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    startQuiz();
                });

                elements.topicSelect.addEventListener('change', updateAvailableCount);
                elements.difficultyChecks.forEach(cb => {
                    cb.addEventListener('change', () => {
                        updateConfigFromForm();
                        updateAvailableCount();
                    });
                });

                elements.submitAnswerBtn.addEventListener('click', submitAnswer);
                elements.nextBtn.addEventListener('click', nextQuestion);
                elements.prevBtn.addEventListener('click', previousQuestion);
                elements.endQuizBtn.addEventListener('click', () => {
                    if (confirm('Are you sure you want to end the quiz? Your progress will be saved.')) {
                        endQuiz();
                    }
                });

                elements.retakeQuizBtn.addEventListener('click', retakeQuiz);
                elements.newQuizBtn.addEventListener('click', newQuiz);
                elements.backHomeBtn.addEventListener('click', () => {
                    window.location.href = '../index.html';
                });
            }

            function init() {
                state.questions = loadAllQuestions();
                updateConfigFromForm();
                updateAvailableCount();
                setupEventListeners();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
