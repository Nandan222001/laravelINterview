    <script>

            {

                question: 'What is concurrent rendering in React 18 and how does it work?',
                answer: `<p>Concurrent rendering is a new mechanism in React 18 that allows React to interrupt rendering work to handle more urgent updates, enabling better user experience by keeping the UI responsive during expensive rendering operations.</p>
<div class="diagram">┌─────────────────────────────────────────────────────────┐
│       React 18 Concurrent Rendering Architecture       │
├─────────────────────────────────────────────────────────┤
│                                                         │
│  Time-Slicing Flow:                                     │
│  ┌─────────┐   ┌─────────┐   ┌─────────┐             │
│  │ Frame 1 │ → │ Frame 2 │ → │ Frame 3 │             │
│  │ 16.67ms │   │ 16.67ms │   │ 16.67ms │             │
│  └─────────┘   └─────────┘   └─────────┘             │
│       ↓             ↓             ↓                     │
│   [Work]  [User]  [Work]  [User]  [Work]              │
│            Input           Input                        │
│                                                         │
│  Priority Levels:                                       │
│  ┌──────────────────────────────────────┐              │
│  │ 🔴 URGENT (Immediate)                │              │
│  │    • User input (typing, clicking)   │              │
│  │    • Animations                      │              │
│  │                                      │              │
│  │ 🟡 TRANSITION (Deferrable)           │              │
│  │    • Search results                  │              │
│  │    • Filtering data                  │              │
│  │    • Tab switching                   │              │
│  │                                      │              │
│  │ 🟢 DEFERRED (Low priority)           │              │
│  │    • Off-screen content              │              │
│  │    • Analytics                       │              │
│  └──────────────────────────────────────┘              │
│                                                         │
│  Benefits:                                              │
│  ✓ Non-blocking UI updates                             │
│  ✓ Interruptible rendering                             │
│  ✓ Priority-based scheduling                           │
│  ✓ Better perceived performance                        │
└─────────────────────────────────────────────────────────┘</div>
<div class="metric-improvement">Performance: 40-60% faster perceived responsiveness</div>`
            },
            {
                id: 2,
                topic: 'react-18',
                question: 'How does useTransition hook work and when should you use it?',
                answer: `<pre><code>import { useTransition, useState } from 'react'

function CarSearchResults() {
  const [isPending, startTransition] = useTransition()
  const [query, setQuery] = useState('')
  const [results, setResults] = useState([])

  const handleSearch = (value) => {
    // Urgent: Update input immediately
    setQuery(value)
    
    // Non-urgent: Update results with transition
    startTransition(() => {
      const filtered = expensiveSearch(value)
      setResults(filtered)
    })
  }

  return (
    <div>
      <input 
        value={query} 
        onChange={(e) => handleSearch(e.target.value)}
        placeholder="Search cars..."
      />
      {isPending && <Spinner />}
      <ResultsList results={results} />
    </div>
  )
}</code></pre>
<p><strong>Key Points:</strong></p>
<ul>
  <li>Returns <code>[isPending, startTransition]</code></li>
  <li><code>isPending</code>: Boolean indicating transition state</li>
  <li><code>startTransition</code>: Function to mark updates as non-urgent</li>
  <li>User input stays responsive during expensive operations</li>
</ul>
<div class="metric-improvement">Reduces input lag by 70-80%</div>`

        // Generate comprehensive question set
        function generateAllQuestions() {
            const allQuestions = [...baseQuestions];
            
            const topicTemplates = {
                'react-18': {
                    range: [3, 100],
                    questions: [
                        { q: 'Demonstrate useDeferredValue in a car rental search component', a: 'useDeferredValue defers updating expensive UI parts until after urgent updates complete, keeping input responsive.' },

                        { q: 'What are Server Actions and how to use them?', a: 'Server Actions are async functions that run on server, marked with "use server" directive.' },
                        { q: 'Create nested layouts with shared UI', a: 'Layouts persist across routes and can be nested for hierarchical UI structure.' },
                        { q: 'How does streaming work in App Router?', a: 'Suspense boundaries enable progressive rendering and streaming of server components.' },
                        { q: 'Implement middleware for authentication', a: 'Middleware runs before requests, enabling auth checks, redirects, and header modifications.' },
                        { q: 'What is the difference between SSR, SSG, and ISR?', a: 'SSR renders on each request, SSG at build time, ISR regenerates static pages on-demand.' },

                    const template = questions[qIndex];
                    
                    allQuestions.push({
                        id: i,
                        topic: topic,
                        question: `${i}. ${template.q}`,
                        answer: `<p><strong>Answer:</strong> ${template.a}</p>
                            <p>This question covers essential concepts in ${topic.replace('-', ' ')} for building production-ready car rental SaaS applications with optimal performance and user experience.</p>
                            ${i % 20 === 0 ? '<div class="metric-improvement">📊 Implementation improves metrics by 30-50%</div>' : ''}`
                    });
                }
            });

            return allQuestions.sort((a, b) => a.id - b.id);
        }

        const allQuestions = generateAllQuestions();

        function renderQuestions(questions) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = questions.map(q => `
                <article data-topic="${q.topic}" data-id="${q.id}">
                    <div class="question-header">
                        <h2 class="question">${q.question}</h2>
                        <div class="badges">
                            <span class="badge badge-${q.topic}">${q.topic}</span>
                        </div>
                    </div>
                    <div class="answer">${q.answer}</div>
                </article>
            `).join('');
        }

        function filterQuestions() {
            const topic = document.getElementById('topic').value;
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            const filtered = allQuestions.filter(q => {
                const matchesTopic = !topic || q.topic === topic;
                const matchesSearch = !searchTerm || 
                    q.question.toLowerCase().includes(searchTerm) ||
                    q.answer.toLowerCase().includes(searchTerm);
                return matchesTopic && matchesSearch;
            });

            renderQuestions(filtered);
            document.getElementById('visibleCount').textContent = filtered.length;
        }

        document.getElementById('topic').addEventListener('change', filterQuestions);
        document.getElementById('search').addEventListener('input', filterQuestions);

        // Initial render
        renderQuestions(allQuestions);
        document.getElementById('totalCount').textContent = allQuestions.length;
        document.getElementById('visibleCount').textContent = allQuestions.length;
    </script>
    <script src="../assets/js/progress-tracker.js"></script>
    <script src="../assets/js/bookmark-system.js"></script>
    <script src="../assets/js/theme-manager.js"></script>
</body>
